name: pages
on:
  push:
    branches: [main]
    paths: [site/**, data/**, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Không hủy deploy đang chạy — hủy giữa chừng dễ làm Pages báo
# "Deployment failed, try again later". Xếp hàng lần lượt thay vì cancel.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site + data
        run: |
          mkdir -p _pub
          cp -r site/* _pub/
          rm -rf _pub/data
          cp -r data _pub/data
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pub
      - id: deploy
        uses: actions/deploy-pages@v4
