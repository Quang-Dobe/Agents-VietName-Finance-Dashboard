<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lãi suất tiết kiệm — Giá Việt</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="apple-touch-icon" href="assets/logo-180.png">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site">
    <div class="brand">
      <a href="index.html" style="text-decoration:none"><img src="assets/logo.svg" alt="Trang chủ" width="30" height="30"></a>
      <div><h1>Lãi suất tiết kiệm</h1></div>
    </div>
    <nav><a href="index.html">← Dashboard</a></nav>
  </header>

  <main class="detail">
    <p class="unit" id="sub">Phần trăm mỗi năm, gửi tại quầy, lãi cuối kỳ. Cập nhật mỗi thứ Hai.</p>
    <div class="table-scroll"><table id="rates-table"></table></div>
    <div class="actions"><span id="ratemeta" style="color:var(--ink-3);font-size:13px"></span></div>
  </main>

  <footer class="site">
    <a href="docs.html">Cách hoạt động</a> ·
    <a href="https://github.com/quang-dobe/agents-vietname-finance-dashboard">GitHub</a>
    <p class="disclaimer">Số liệu tổng hợp từ nguồn công khai, chỉ để tham khảo.</p>
  </footer>

  <script src="assets/vendor/chart.umd.min.js"></script>
  <script src="assets/app.js"></script>
  <script>
    const TERMS = [1, 3, 6, 12, 24];
    fetch("data/deposit-rates/latest.json", { cache: "no-store" })
      .then((r) => { if (!r.ok) throw new Error("no data"); return r.json(); })
      .then((doc) => {
        const banks = [...new Set(doc.rates.map((r) => r.bank))];
        const get = (b, t) => { const x = doc.rates.find((r) => r.bank === b && r.term_months === t); return x ? x.rate : null; };
        // ngân hàng có lãi 12T cao nhất tô đậm
        const best12 = Math.max(...doc.rates.filter((r) => r.term_months === 12).map((r) => r.rate));
        let html = "<thead><tr><th>Ngân hàng</th>" + TERMS.map((t) => `<th>${t} tháng</th>`).join("") + "</tr></thead><tbody>";
        for (const b of banks) {
          html += `<tr><td>${b}</td>` + TERMS.map((t) => {
            const v = get(b, t);
            const hi = t === 12 && v === best12 ? ' style="color:var(--c-rates);font-weight:650"' : "";
            return `<td${hi}>${v == null ? "—" : v.toFixed(2) + "%"}</td>`;
          }).join("") + "</tr>";
        }
        document.getElementById("rates-table").innerHTML = html + "</tbody>";
        document.getElementById("ratemeta").textContent =
          `Tuần ${doc.week} · ${banks.length} ngân hàng · nguồn: ${doc.source_url}`;
      })
      .catch(() => {
        document.getElementById("rates-table").outerHTML =
          '<p class="empty">Chưa có snapshot lãi suất. Dữ liệu được cập nhật vào thứ Hai hằng tuần.</p>';
      });
  </script>
</body>
</html>
